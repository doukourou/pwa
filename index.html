<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>en ligne </title>
    <!-- on elie le manifest.json pour que l'app soit instalable -->
    <link rel="manifest" href="./manifest.json">

    <!-- on vas charger le service worker 
     -->
    <script>
        // on attend la fin du chargement pour eviter de surcharger le navigateur
        window.addEventListener('load', ()=>{
            // on verifie si le service worker est disponible pour eviter de planter le navigateur 
            if("serviceWorker" in navigator){
                navigator.serviceWorker.register('./sw.js')
            }
        } )
        
    </script>
</head>
<body>
    Tu es en ligne cédric 
</body>
</html>
